name: Publish to MCP Registry

# 공식 MCP Registry(server.json) 재게시용 수동 워크플로우.
# 정상 릴리스에서는 release.yml 의 registry 잡이 태그 푸시 때 자동 게시한다. 이 워크플로우는 그 잡이
# 실패했거나(예: 검증 오류 수정 후) 특정 버전을 다시 올려야 할 때 dispatch 로 독립 실행한다.
# 대상 버전은 이미 npm 에 게시돼 있어야 검증을 통과한다.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to (re)publish to the MCP Registry (e.g. 0.1.5). Must already be on npm.'
        required: true
        type: string

permissions:
  id-token: write   # OIDC (registry 인증), 시크릿 불필요
  contents: read

jobs:
  registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync server.json version
        run: |
          VER="${{ inputs.version }}"
          jq --arg v "$VER" '.version=$v | .packages[0].version=$v' server.json > server.tmp && mv server.tmp server.json
      - name: Install mcp-publisher
        run: curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
