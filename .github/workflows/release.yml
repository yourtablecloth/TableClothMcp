name: Release

# 하나의 버전 태그(vX.Y.Z)에서 두 배포 채널을 "같은 선상에서 동일하게" 릴리스한다:
#   - dnx 레인: .NET tool NuGet 패키지(TableCloth.Mcp) -> nuget.org
#   - npx 레인: 플랫폼별 NativeAOT 바이너리를 npm 패키지(tablecloth-mcp + 플랫폼 optionalDependency)로 -> npmjs.org
# 두 채널의 버전은 태그에서 파생된 동일 값으로 스탬프된다.
#
# 필요한 저장소 시크릿:
#   NUGET_API_KEY : nuget.org 푸시 키
#   NPM_TOKEN     : npmjs.org publish 토큰(Automation)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0), no leading v'
        required: true
        type: string

# 기본은 최소 권한. OIDC(id-token) 는 게시 잡에서만 켠다.
permissions:
  contents: read

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          if ! echo "$V" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::invalid version '$V' (expected X.Y.Z)"; exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Release version: $V"

  # ---- dnx 레인: .NET tool NuGet 패키지 (Trusted Publishing / OIDC) ----
  nuget:
    needs: meta
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # OIDC 토큰 발급(신뢰 게시). 없으면 login 이 조용히 실패.
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Pack .NET tool
        run: dotnet pack -c Release -p:Version=${{ needs.meta.outputs.version }} -o out
      # nuget.org 의 trusted publishing 정책(repo + workflow=release.yml + environment=production)에 바인딩된
      # OIDC 토큰을 1시간짜리 임시 API 키로 교환한다. 장기 API 키(NUGET_API_KEY) 불필요.
      - name: NuGet trusted publishing login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}   # nuget.org 사용자명(이메일 아님)
      - name: Push to NuGet
        run: dotnet nuget push "out/*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

  # ---- npx 레인: 플랫폼별 NativeAOT 빌드 (NativeAOT 는 타깃 OS 에서 빌드해야 함) ----
  aot:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          # windows 러너 이미지는 "Desktop development with C++"(MSVC 링커)를 포함 → NativeAOT 링크 성립.
          - { rid: win-x64,     runner: windows-latest,   bin: tablecloth-mcp.exe }
          - { rid: win-arm64,   runner: windows-11-arm,   bin: tablecloth-mcp.exe }
          # macOS 는 Apple Silicon(arm64)만 — macSandbox 가 Apple Silicon 전용이라 동일하게 arm64만 낸다.
          - { rid: osx-arm64,   runner: macos-latest,     bin: tablecloth-mcp }
          # Linux(디스커버리/generate_wsb 용). 자동 실행 러너는 추후(현재 macSandbox 는 macOS 전용).
          - { rid: linux-x64,   runner: ubuntu-latest,    bin: tablecloth-mcp }
          - { rid: linux-arm64, runner: ubuntu-24.04-arm, bin: tablecloth-mcp }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      # Linux NativeAOT 는 clang + zlib 개발 헤더가 필요하다(macOS 는 Xcode CLT, Windows 는 MSVC 로 충족).
      - name: Install Linux AOT toolchain
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev
      - name: Publish NativeAOT (${{ matrix.rid }})
        run: dotnet publish -r ${{ matrix.rid }} -c Release -p:PublishAot=true -p:PackAsTool=false -p:Version=${{ needs.meta.outputs.version }} -o out
      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: aot-${{ matrix.rid }}
          path: out/${{ matrix.bin }}
          if-no-files-found: error

  # ---- npx 레인: npm 패키지 조립 + 게시 (Trusted Publishing / OIDC) ----
  npm:
    needs: [meta, aot]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # OIDC 신뢰 게시 — 장기 npm 토큰(NPM_TOKEN) 불필요, provenance 자동 첨부.
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      # OIDC 신뢰 게시는 npm CLI >= 11.5.1 필요(러너 기본이 더 낮을 수 있어 최신으로 올린다).
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Download native binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Assemble npm packages
        run: node scripts/assemble-npm.mjs ${{ needs.meta.outputs.version }}
      # 각 패키지에 npmjs.com 의 trusted publisher(repo + workflow=release.yml + environment=production)가
      # 설정돼 있어야 한다. 패키지가 존재해야 설정 가능 → 최초 1회는 부트스트랩 토큰 필요(README 참고).
      - name: Publish platform packages, then the launcher
        shell: bash
        env:
          # 부트스트랩 fallback: trusted publisher 설정 전(패키지 미존재) 최초 게시는 이 토큰으로 나간다.
          # 각 패키지에 trusted publisher 를 설정하고 나면 OIDC 가 우선되어 이 토큰은 사용되지 않으므로
          # NPM_TOKEN secret 은 그 시점에 삭제해도 된다(그때부턴 완전 무-토큰 OIDC 게시).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          # 플랫폼 패키지를 먼저 게시(런처의 optionalDependency 가 해석 가능해야 하므로), 런처는 마지막.
          for dir in dist/npm/tablecloth-mcp-*/; do
            echo "publishing $dir"; npm publish "$dir" --access public
          done
          npm publish "dist/npm/tablecloth-mcp/" --access public
